{% extends "base.html" %}
{% block title %}{{ action }} Channel Partner — HeavyLift CRM{% endblock %}
{% block page_title %}{{ action }} Channel Partner{% endblock %}
{% block content %}
{% set values = form_data or {} %}
<div class="form-card">
  <form method="POST">
    {{ csrf_input() }}
    <div class="form-group">
      <label>Name <span class="req">*</span></label>
      <div class="input-wrap"><i class="fa-solid fa-building"></i>
        <input type="text" name="name" required value="{{ values.get('name', partner.name if partner else '') }}"/>
      </div>
    </div>
    <div class="form-group">
      <label>Phone</label>
      <div class="input-wrap"><i class="fa-solid fa-phone"></i>
        <input type="text" name="phone" value="{{ values.get('phone', partner.phone if partner else '') }}"/>
      </div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <div class="input-wrap"><i class="fa-solid fa-envelope"></i>
        <input type="text" name="email" value="{{ values.get('email', partner.email if partner else '') }}"/>
      </div>
    </div>
    <div class="form-group">
      <label>Trainer</label>
      <div class="input-wrap"><i class="fa-solid fa-user-tie"></i>
        <select name="trainer_id">
          <option value="">- Select trainer -</option>
          {% for t in trainers %}
          <option value="{{ t.id }}" {% if (values.get('trainer_id') and values.get('trainer_id')|int==t.id) or (partner and partner.trainer_id==t.id) %}selected{% endif %}>{{ t.username }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Address</label>
      <textarea name="address" rows="4" class="form-textarea">{{ values.get('address', partner.address if partner else '') }}</textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Save</button>
      <a href="{{ url_for('channel_partners.index') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
