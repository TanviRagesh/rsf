{% extends "base.html" %}
{% block title %}{{ action }} Franchise — HeavyLift CRM{% endblock %}
{% block page_title %}{{ action }} Franchise{% endblock %}
{% block content %}
{% set values = form_data or {} %}
<div class="form-card">
  <form method="POST">
    {{ csrf_input() }}
    <div class="form-group">
      <label>Franchise Code <span class="req">*</span></label>
      <div class="input-wrap"><i class="fa-solid fa-hashtag"></i>
        <input type="text" name="code" required placeholder="e.g. FS001" value="{{ values.get('code', franchise.code if franchise else '') }}"/>
      </div>
    </div>
    <div class="form-group">
      <label>Franchise Name <span class="req">*</span></label>
      <div class="input-wrap"><i class="fa-solid fa-building"></i>
        <input type="text" name="name" required placeholder="Franchise name" value="{{ values.get('name', franchise.name if franchise else '') }}"/>
      </div>
    </div>
    <div class="form-group">
      <label>Phone</label>
      <div class="input-wrap"><i class="fa-solid fa-phone"></i>
        <input type="text" name="phone" placeholder="Contact number" value="{{ values.get('phone', franchise.phone if franchise else '') }}"/>
      </div>
    </div>
    <div class="form-group">
      <label>Address</label>
      <textarea name="address" rows="4" class="form-textarea" placeholder="Address…">{{ values.get('address', franchise.address if franchise else '') }}</textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Save</button>
      <a href="{{ url_for('franchises.index') }}" class="btn btn-outline"><i class="fa-solid fa-xmark"></i> Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
