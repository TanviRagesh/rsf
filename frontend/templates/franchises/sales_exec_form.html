{% extends "base.html" %}
{% block title %}{{ action }} Sales Executive — HeavyLift CRM{% endblock %}
{% block page_title %}{{ action }} Sales Executive for {{ franchise.name }}{% endblock %}
{% block content %}
{% set values = form_data or {} %}
<div class="form-card">
  <form method="POST">
    {{ csrf_input() }}
    <div class="form-group">
      <label>Name <span class="req">*</span></label>
      <div class="input-wrap"><i class="fa-solid fa-user"></i>
        <input type="text" name="name" required value="{{ values.get('name', sales_exec.name if sales_exec else '') }}"/>
      </div>
    </div>
    <div class="form-group">
      <label>Phone</label>
      <div class="input-wrap"><i class="fa-solid fa-phone"></i>
        <input type="text" name="phone" value="{{ values.get('phone', sales_exec.phone if sales_exec else '') }}"/>
      </div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <div class="input-wrap"><i class="fa-solid fa-envelope"></i>
        <input type="text" name="email" value="{{ values.get('email', sales_exec.email if sales_exec else '') }}"/>
      </div>
    </div>
    <div class="form-group">
      <label>Address</label>
      <textarea name="address" rows="4" class="form-textarea">{{ values.get('address', sales_exec.address if sales_exec else '') }}</textarea>
    </div>
    <div class="form-group">
      <label>Remarks</label>
      <textarea name="remarks" rows="4" class="form-textarea">{{ values.get('remarks', sales_exec.remarks if sales_exec else '') }}</textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Save</button>
      <a href="{{ url_for('franchises.detail', fr_id=franchise.id) }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
