{% extends "base.html" %}
{% block title %}{{ action }} Location — HeavyLift CRM{% endblock %}
{% block page_title %}{{ action }} Location{% endblock %}
{% block content %}
{% set values = form_data or {} %}
<div class="form-card">
  <form method="POST">
    {{ csrf_input() }}
    <div class="form-group">
      <label>Location Name <span class="req">*</span></label>
      <div class="input-wrap"><i class="fa-solid fa-location-dot"></i>
        <input type="text" name="name" required placeholder="e.g. Mumbai Centre" value="{{ values.get('name', location.name if location else '') }}"/>
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" rows="4" class="form-textarea" placeholder="Optional description…">{{ values.get('description', location.description if location else '') }}</textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Save</button>
      <a href="{{ url_for('locations.index') }}" class="btn btn-outline"><i class="fa-solid fa-xmark"></i> Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
